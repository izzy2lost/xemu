name: Build iOS Full Stack

on:
  push:
    branches-ignore:
      - master
    tags-ignore:
      - "v*"
    paths:
      - "ios-app/**"
      - "ui/**"
      - "include/ui/**"
      - "meson.build"
      - "meson_options.txt"
      - ".github/workflows/build-ios-full-stack.yml"
  workflow_dispatch:
    inputs:
      sim_destination:
        description: iOS Simulator destination for xcodebuild
        required: false
        default: "platform=iOS Simulator,name=iPhone 16,OS=latest"
        type: string
      run_device_build:
        description: Also run the generic iOS device build
        required: false
        default: true
        type: boolean
      min_ios_version:
        description: Minimum iOS version used for the dependency/core build
        required: false
        default: "17.0"
        type: string
      simulator_arch:
        description: Simulator architecture
        required: false
        default: auto
        type: choice
        options:
          - auto
          - arm64
          - x86_64

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_ios_deps:
    name: Build iOS dependency bundle
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build dependency prefixes
        env:
          X1BOX_IOS_MIN_VERSION: ${{ inputs.min_ios_version || '17.0' }}
          X1BOX_IOS_SIMULATOR_ARCH: ${{ inputs.simulator_arch || 'auto' }}
          X1BOX_IOS_DEPS_ARTIFACT_NAME: x1box-ios-deps
          X1BOX_IOS_DEPS_BUILD_ROOT: ${{ github.workspace }}/build/ios-deps
        run: bash ios-app/scripts/build-x1box-ios-deps.sh

      - name: Upload dependency artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: x1box-ios-deps
          path: |
            build/ios-deps/artifacts/x1box-ios-deps
            build/ios-deps/logs
          if-no-files-found: warn
          compression-level: 0

  build_embedded_core:
    name: Build embedded iOS core
    needs:
      - build_ios_deps
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Python tooling
        run: |
          python3 -m venv "$RUNNER_TEMP/x1box-ios-python"
          source "$RUNNER_TEMP/x1box-ios-python/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install meson ninja
          echo "$RUNNER_TEMP/x1box-ios-python/bin" >> "$GITHUB_PATH"

      - name: Download dependency artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: x1box-ios-deps
          path: build/ios-core-deps

      - name: Build embedded core xcframework
        env:
          X1BOX_IOS_DEPS_ROOT: ${{ github.workspace }}/build/ios-core-deps
          X1BOX_IOS_MIN_VERSION: ${{ inputs.min_ios_version || '17.0' }}
          X1BOX_IOS_SIMULATOR_ARCH: ${{ inputs.simulator_arch || 'auto' }}
          X1BOX_IOS_EMBEDDED_CORE_BUILD_ROOT: ${{ github.workspace }}/build/ios-embedded-core
        run: bash ios-app/scripts/build-x1box-embedded-core.sh

      - name: Upload embedded core artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: x1box-ios-embedded-core
          path: |
            build/ios-embedded-core/artifacts
            build/ios-embedded-core/logs
          if-no-files-found: warn
          compression-level: 0

  build_ios_app:
    name: Build iOS app shell with embedded core
    needs:
      - build_embedded_core
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Download embedded core artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: x1box-ios-embedded-core
          path: build/ios-embedded-core-download

      - name: Stage embedded core drop-in
        run: |
          bash ios-app/scripts/prepare-embedded-core-dropin.sh \
            build/ios-embedded-core-download \
            ios-app/EmbeddedCore

      - name: Build and test iOS app
        env:
          SIM_DESTINATION: ${{ inputs.sim_destination || 'platform=iOS Simulator,name=iPhone 16,OS=latest' }}
          BUILD_ROOT: build/ios-ci
          RUN_DEVICE_BUILD: ${{ inputs.run_device_build == false && 'false' || 'true' }}
        run: bash ios-app/scripts/ci-build-ios.sh

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## X1 BOX iOS Full Stack"
            echo
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Minimum iOS: \`${{ inputs.min_ios_version || '17.0' }}\`"
            echo "- Simulator arch: \`${{ inputs.simulator_arch || 'auto' }}\`"
            echo "- Simulator destination: \`${{ inputs.sim_destination || 'platform=iOS Simulator,name=iPhone 16,OS=latest' }}\`"
            echo "- Device build enabled: \`${{ inputs.run_device_build == false && 'false' || 'true' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS CI artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: x1box-ios-ci
          path: |
            build/ios-ci/logs
            build/ios-ci/results
          if-no-files-found: warn
          compression-level: 0
