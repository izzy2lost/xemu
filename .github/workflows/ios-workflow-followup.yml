name: iOS Workflow Follow-up

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Source Build iOS App run id
        required: true
        type: string
      source_run_number:
        description: Source Build iOS App run number
        required: true
        type: string
      source_run_status:
        description: Source Build iOS App status
        required: true
        type: string
      source_run_conclusion:
        description: Source Build iOS App conclusion
        required: true
        type: string
      source_run_event:
        description: Source Build iOS App event
        required: true
        type: string
      source_run_name:
        description: Source Build iOS App workflow name
        required: true
        type: string
      source_run_url:
        description: Source Build iOS App run URL
        required: true
        type: string
      source_head_branch:
        description: Source head branch
        required: true
        type: string
      source_head_sha:
        description: Source head SHA
        required: true
        type: string
      source_pr_number:
        description: Related PR number when available
        required: false
        default: ""
        type: string
  workflow_run:
    workflows:
      - Build iOS App
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ios-followup-${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  summarize:
    name: Summarize iOS workflow result
    runs-on: ubuntu-latest
    steps:
      - name: Gather workflow metadata
        id: gather
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id || github.event.workflow_run.id }}
          RUN_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_number || github.event.workflow_run.run_number }}
          RUN_STATUS: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_status || github.event.workflow_run.status }}
          RUN_CONCLUSION: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_conclusion || github.event.workflow_run.conclusion }}
          RUN_EVENT: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_event || github.event.workflow_run.event }}
          RUN_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_name || github.event.workflow_run.name }}
          RUN_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_url || github.event.workflow_run.html_url }}
          HEAD_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.source_head_branch || github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.source_head_sha || github.event.workflow_run.head_sha }}
          PR_NUMBER_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.source_pr_number || '' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/ios-followup

          artifacts_api="https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts"
          jobs_api="https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100"
          artifact_response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${artifacts_api}")"
          jobs_response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${jobs_api}")"

          artifact_count="$(jq '.total_count // 0' <<<"${artifact_response}")"
          artifact_names="$(jq -r 'if (.artifacts | length) == 0 then "none" else [.artifacts[].name] | join(", ") end' <<<"${artifact_response}")"
          failed_jobs_json="$(jq -c '[.jobs[] | select((.conclusion // "pending") != "success") | {name, conclusion: (.conclusion // "pending"), steps: [(.steps // [])[] | select((.conclusion // "pending") != "success" and (.conclusion // "pending") != "skipped") | {name, conclusion: (.conclusion // "pending")}]}]' <<<"${jobs_response}")"
          failed_jobs_markdown="$(jq -r 'if length == 0 then "none" else map("- " + .name + " [" + .conclusion + "]" + (if (.steps | length) > 0 then ": " + ([.steps[] | .name + " [" + .conclusion + "]"] | join(", ")) else "" end)) | join("\n") end' <<<"${failed_jobs_json}")"
          pr_number="${PR_NUMBER_INPUT}"
          if [[ -z "${pr_number}" ]]; then
            pr_number="$(jq -r '.workflow_run.pull_requests[0].number // empty' "${GITHUB_EVENT_PATH}")"
          fi

          {
            echo "## X1 BOX iOS Workflow Follow-up"
            echo
            echo "- Workflow: \`${RUN_NAME}\`"
            echo "- Run number: \`${RUN_NUMBER}\`"
            echo "- Status: \`${RUN_STATUS}\`"
            echo "- Conclusion: \`${RUN_CONCLUSION:-pending}\`"
            echo "- Event: \`${RUN_EVENT}\`"
            echo "- Branch: \`${HEAD_BRANCH}\`"
            echo "- Commit: \`${HEAD_SHA}\`"
            echo "- Artifacts: \`${artifact_names}\`"
            echo "- Run URL: ${RUN_URL}"
            echo
            echo "### Failed jobs and steps"
            echo
            printf '%s\n' "${failed_jobs_markdown}"
          } > build/ios-followup/workflow-run-summary.md

          jq -n \
            --arg checked_at_utc "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg workflow "${RUN_NAME}" \
            --argjson run_id "${RUN_ID}" \
            --argjson run_number "${RUN_NUMBER}" \
            --arg status "${RUN_STATUS}" \
            --arg conclusion "${RUN_CONCLUSION:-pending}" \
            --arg event "${RUN_EVENT}" \
            --arg branch "${HEAD_BRANCH}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg html_url "${RUN_URL}" \
            --arg repo "${REPO}" \
            --arg artifacts "${artifact_names}" \
            --arg pr_number "${pr_number}" \
            --argjson failed_jobs "${failed_jobs_json}" \
            '{
              checked_at_utc: $checked_at_utc,
              repository: $repo,
              workflow: $workflow,
              run_id: $run_id,
              run_number: $run_number,
              status: $status,
              conclusion: $conclusion,
              event: $event,
              branch: $branch,
              head_sha: $head_sha,
              html_url: $html_url,
              artifacts: $artifacts,
              failed_jobs: $failed_jobs,
              pr_number: (if $pr_number == "" then null else ($pr_number | tonumber) end)
            }' > build/ios-followup/workflow-run-summary.json

          {
            echo "pr_number=${pr_number}"
            echo "artifact_count=${artifact_count}"
            echo "artifact_names<<EOF"
            echo "${artifact_names}"
            echo "EOF"
            echo "failed_jobs_markdown<<EOF"
            echo "${failed_jobs_markdown}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish job summary
        shell: bash
        run: cat build/ios-followup/workflow-run-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload follow-up artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: x1box-ios-followup-${{ github.event.workflow_run.id }}
          path: build/ios-followup
          if-no-files-found: error
          compression-level: 0

      - name: Update pull request comment
        if: ${{ steps.gather.outputs.pr_number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.gather.outputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail

          marker="<!-- x1box-ios-workflow-followup -->"
          comments_api="https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments"
          comments="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${comments_api}?per_page=100")"

          existing_comment_id="$(jq -r --arg marker "${marker}" 'map(select(.body | contains($marker))) | last | .id // empty' <<<"${comments}")"

          comment_body="$(printf '%s\n\n%s\n' "${marker}" "$(cat build/ios-followup/workflow-run-summary.md)")"

          payload="$(jq -n --arg body "${comment_body}" '{body: $body}')"

          if [[ -n "${existing_comment_id}" ]]; then
            curl -fsSL \
              -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "${payload}" \
              "https://api.github.com/repos/${REPO}/issues/comments/${existing_comment_id}" > /dev/null
          else
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "${payload}" \
              "${comments_api}" > /dev/null
          fi
