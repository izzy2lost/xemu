name: Build iOS App

on:
  workflow_dispatch:
    inputs:
      sim_destination:
        description: iOS Simulator destination for xcodebuild
        required: false
        default: "platform=iOS Simulator,name=iPhone 16,OS=latest"
        type: string
      run_device_build:
        description: Also run the generic iOS device build
        required: false
        default: true
        type: boolean
      artifact_name:
        description: Artifact name used when uploading logs/results
        required: false
        default: x1box-ios-ci
        type: string
  pull_request:
    paths:
      - "ios-app/**"
      - "ui/xemu.c"
      - "include/ui/xemu-embedded.h"
      - ".github/workflows/build-ios-app.yml"
  push:
    branches-ignore:
      - master
    tags-ignore:
      - "v*"
    paths:
      - "ios-app/**"
      - "ui/xemu.c"
      - "include/ui/xemu-embedded.h"
      - ".github/workflows/build-ios-app.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_ios:
    name: Build iOS shell and tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build and test iOS app
        env:
          SIM_DESTINATION: ${{ inputs.sim_destination || 'platform=iOS Simulator,name=iPhone 16,OS=latest' }}
          BUILD_ROOT: build/ios-ci
          RUN_DEVICE_BUILD: ${{ inputs.run_device_build == false && 'false' || 'true' }}
        run: bash ios-app/scripts/ci-build-ios.sh

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## X1 BOX iOS CI"
            echo
            echo "- Simulator destination: \`${{ inputs.sim_destination || 'platform=iOS Simulator,name=iPhone 16,OS=latest' }}\`"
            echo "- Device build enabled: \`${{ inputs.run_device_build == false && 'false' || 'true' }}\`"
            echo "- Artifact name: \`${{ inputs.artifact_name || 'x1box-ios-ci' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS CI artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: ${{ inputs.artifact_name || 'x1box-ios-ci' }}
          path: |
            build/ios-ci/logs
            build/ios-ci/results
          if-no-files-found: warn
          compression-level: 0

  dispatch_followup:
    name: Dispatch iOS follow-up
    if: ${{ always() && github.ref_name != 'master' }}
    needs:
      - build_ios
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch follow-up workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_RUN_NUMBER: ${{ github.run_number }}
          SOURCE_RUN_STATUS: completed
          SOURCE_RUN_CONCLUSION: ${{ needs.build_ios.result }}
          SOURCE_RUN_EVENT: ${{ github.event_name }}
          SOURCE_RUN_NAME: ${{ github.workflow }}
          SOURCE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SOURCE_HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          SOURCE_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        shell: bash
        run: |
          set -euo pipefail

          payload="$(jq -n \
            --arg ref "${REF_NAME}" \
            --arg run_id "${SOURCE_RUN_ID}" \
            --arg run_number "${SOURCE_RUN_NUMBER}" \
            --arg run_status "${SOURCE_RUN_STATUS}" \
            --arg run_conclusion "${SOURCE_RUN_CONCLUSION}" \
            --arg run_event "${SOURCE_RUN_EVENT}" \
            --arg run_name "${SOURCE_RUN_NAME}" \
            --arg run_url "${SOURCE_RUN_URL}" \
            --arg head_branch "${SOURCE_HEAD_BRANCH}" \
            --arg head_sha "${SOURCE_HEAD_SHA}" \
            --arg pr_number "${SOURCE_PR_NUMBER}" \
            '{ref: $ref, inputs: {
              source_run_id: $run_id,
              source_run_number: $run_number,
              source_run_status: $run_status,
              source_run_conclusion: $run_conclusion,
              source_run_event: $run_event,
              source_run_name: $run_name,
              source_run_url: $run_url,
              source_head_branch: $head_branch,
              source_head_sha: $head_sha,
              source_pr_number: $pr_number
            }}')"

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "${payload}" \
            "https://api.github.com/repos/${REPO}/actions/workflows/ios-workflow-followup.yml/dispatches" > /dev/null
