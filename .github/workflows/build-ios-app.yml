name: Build iOS App

on:
  workflow_dispatch:
    inputs:
      sim_destination:
        description: iOS Simulator destination for xcodebuild
        required: false
        default: "platform=iOS Simulator,name=iPhone 16,OS=latest"
        type: string
      run_device_build:
        description: Also run the generic iOS device build
        required: false
        default: true
        type: boolean
      artifact_name:
        description: Artifact name used when uploading logs/results
        required: false
        default: x1box-ios-ci
        type: string
      embedded_core_run_id:
        description: Workflow run ID that produced the embedded core artifact
        required: false
        default: ""
        type: string
      embedded_core_artifact_name:
        description: Artifact name that contains X1BoxEmbeddedCore.framework/.xcframework or libxemu-ios-core.dylib
        required: false
        default: x1box-ios-embedded-core
        type: string
  pull_request:
    paths:
      - "ios-app/**"
      - "ui/xemu.c"
      - "include/ui/xemu-embedded.h"
      - ".github/workflows/build-ios-app.yml"
  push:
    branches-ignore:
      - master
    tags-ignore:
      - "v*"
    paths:
      - "ios-app/**"
      - "ui/xemu.c"
      - "include/ui/xemu-embedded.h"
      - ".github/workflows/build-ios-app.yml"

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_ios:
    name: Build iOS shell and tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Download embedded core artifact
        if: ${{ inputs.embedded_core_run_id != '' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: ${{ inputs.embedded_core_artifact_name || 'x1box-ios-embedded-core' }}
          path: build/ios-embedded-core-download
          repository: ${{ github.repository }}
          run-id: ${{ inputs.embedded_core_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage embedded core drop-in
        if: ${{ inputs.embedded_core_run_id != '' }}
        run: |
          bash ios-app/scripts/prepare-embedded-core-dropin.sh \
            build/ios-embedded-core-download \
            ios-app/EmbeddedCore

      - name: Build and test iOS app
        env:
          SIM_DESTINATION: ${{ inputs.sim_destination || 'platform=iOS Simulator,name=iPhone 16,OS=latest' }}
          BUILD_ROOT: build/ios-ci
          RUN_DEVICE_BUILD: ${{ inputs.run_device_build == false && 'false' || 'true' }}
        run: bash ios-app/scripts/ci-build-ios.sh

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## X1 BOX iOS CI"
            echo
            echo "- Simulator destination: \`${{ inputs.sim_destination || 'platform=iOS Simulator,name=iPhone 16,OS=latest' }}\`"
            echo "- Device build enabled: \`${{ inputs.run_device_build == false && 'false' || 'true' }}\`"
            echo "- Artifact name: \`${{ inputs.artifact_name || 'x1box-ios-ci' }}\`"
            echo "- Embedded core run id: \`${{ inputs.embedded_core_run_id || 'none' }}\`"
            echo "- Embedded core artifact: \`${{ inputs.embedded_core_artifact_name || 'x1box-ios-embedded-core' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload iOS CI artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: ${{ inputs.artifact_name || 'x1box-ios-ci' }}
          path: |
            build/ios-ci/logs
            build/ios-ci/results
          if-no-files-found: warn
          compression-level: 0

  publish_followup:
    name: Publish iOS follow-up
    if: ${{ always() && github.ref_name != 'master' }}
    needs:
      - build_ios
    runs-on: ubuntu-latest
    steps:
      - name: Gather workflow metadata
        id: gather
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_STATUS: completed
          RUN_CONCLUSION: ${{ needs.build_ios.result }}
          RUN_EVENT: ${{ github.event_name }}
          RUN_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER_INPUT: ${{ github.event.pull_request.number || '' }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/ios-followup

          artifacts_api="https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts"
          jobs_api="https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100"
          artifact_response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${artifacts_api}")"
          jobs_response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${jobs_api}")"

          artifact_count="$(jq '.total_count // 0' <<<"${artifact_response}")"
          artifact_names="$(jq -r 'if (.artifacts | length) == 0 then "none" else [.artifacts[].name] | join(", ") end' <<<"${artifact_response}")"
          failed_jobs_json="$(jq -c '[.jobs[] | select((.status // "queued") == "completed" and (.conclusion // "pending") != "success") | {name, conclusion: (.conclusion // "pending"), steps: [(.steps // [])[] | select((.status // "queued") == "completed" and (.conclusion // "pending") != "success" and (.conclusion // "pending") != "skipped") | {name, conclusion: (.conclusion // "pending")}]}]' <<<"${jobs_response}")"
          failed_jobs_markdown="$(jq -r 'if length == 0 then "none" else map("- " + .name + " [" + .conclusion + "]" + (if (.steps | length) > 0 then ": " + ([.steps[] | .name + " [" + .conclusion + "]"] | join(", ")) else "" end)) | join("\n") end' <<<"${failed_jobs_json}")"
          pr_number="${PR_NUMBER_INPUT}"

          {
            echo "## X1 BOX iOS Workflow Follow-up"
            echo
            echo "- Workflow: \`${RUN_NAME}\`"
            echo "- Run number: \`${RUN_NUMBER}\`"
            echo "- Status: \`${RUN_STATUS}\`"
            echo "- Conclusion: \`${RUN_CONCLUSION:-pending}\`"
            echo "- Event: \`${RUN_EVENT}\`"
            echo "- Branch: \`${HEAD_BRANCH}\`"
            echo "- Commit: \`${HEAD_SHA}\`"
            echo "- Artifacts: \`${artifact_names}\`"
            echo "- Run URL: ${RUN_URL}"
            echo
            echo "### Failed jobs and steps"
            echo
            printf '%s\n' "${failed_jobs_markdown}"
          } > build/ios-followup/workflow-run-summary.md

          jq -n \
            --arg checked_at_utc "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg workflow "${RUN_NAME}" \
            --argjson run_id "${RUN_ID}" \
            --argjson run_number "${RUN_NUMBER}" \
            --arg status "${RUN_STATUS}" \
            --arg conclusion "${RUN_CONCLUSION:-pending}" \
            --arg event "${RUN_EVENT}" \
            --arg branch "${HEAD_BRANCH}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg html_url "${RUN_URL}" \
            --arg repo "${REPO}" \
            --arg artifacts "${artifact_names}" \
            --arg pr_number "${pr_number}" \
            --argjson failed_jobs "${failed_jobs_json}" \
            '{
              checked_at_utc: $checked_at_utc,
              repository: $repo,
              workflow: $workflow,
              run_id: $run_id,
              run_number: $run_number,
              status: $status,
              conclusion: $conclusion,
              event: $event,
              branch: $branch,
              head_sha: $head_sha,
              html_url: $html_url,
              artifacts: $artifacts,
              failed_jobs: $failed_jobs,
              pr_number: (if $pr_number == "" then null else ($pr_number | tonumber) end)
            }' > build/ios-followup/workflow-run-summary.json

          {
            echo "pr_number=${pr_number}"
            echo "artifact_count=${artifact_count}"
            echo "artifact_names<<EOF"
            echo "${artifact_names}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish job summary
        shell: bash
        run: cat build/ios-followup/workflow-run-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload follow-up artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
        with:
          name: x1box-ios-followup-${{ github.run_id }}
          path: build/ios-followup
          if-no-files-found: error
          compression-level: 0

      - name: Update pull request comment
        if: ${{ steps.gather.outputs.pr_number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.gather.outputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail

          marker="<!-- x1box-ios-workflow-followup -->"
          comments_api="https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments"
          comments="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${comments_api}?per_page=100")"

          existing_comment_id="$(jq -r --arg marker "${marker}" 'map(select(.body | contains($marker))) | last | .id // empty' <<<"${comments}")"
          comment_body="$(printf '%s\n\n%s\n' "${marker}" "$(cat build/ios-followup/workflow-run-summary.md)")"
          payload="$(jq -n --arg body "${comment_body}" '{body: $body}')"

          if [[ -n "${existing_comment_id}" ]]; then
            curl -fsSL \
              -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "${payload}" \
              "https://api.github.com/repos/${REPO}/issues/comments/${existing_comment_id}" > /dev/null
          else
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "${payload}" \
              "${comments_api}" > /dev/null
          fi
